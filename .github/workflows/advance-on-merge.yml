name: Advance system on merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  advance:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Detect system files touched
        id: detect
        run: |
          files=$(git diff --name-only HEAD^ HEAD | grep '.system.yaml' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Advance systems
        id: advance
        if: steps.detect.outputs.files != ''
        run: |
          python scripts/system_factory.py advance --files ${{ steps.detect.outputs.files }} --issue-output next_issues.json
      - name: Commit system updates
        if: steps.detect.outputs.files != '' && !cancelled()
        run: |
          if git diff --quiet; then
            echo "No system updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: advance system stage"
          git push
      - name: Open next-stage issues
        if: steps.detect.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'next_issues.json';
            if (!fs.existsSync(path)) {
              core.info('No issues to open.');
              return;
            }
            const payload = JSON.parse(fs.readFileSync(path, 'utf8'));
            for (const item of payload) {
              if (!item.issue_title || !item.issue_body || item.changed !== true) continue;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: item.issue_title,
                body: item.issue_body,
              });
            }
