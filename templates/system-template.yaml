name: "{{SYSTEM_NAME}}"
type: "{{SYSTEM_TYPE}}"
objective: "{{SYSTEM_OBJECTIVE}}"
current_stage: intake
status: in_progress
inputs:
  - name: seed_material
    description: Notes, references, or existing documents that describe the desired system
outputs:
  - name: lifecycle_plan
    description: System lifecycle state file and stage-by-stage plan
dependencies:
  - GitHub repository access for state and issues
acceptance_criteria:
  - System lifecycle is captured in a machine-readable file
  - Each stage has a clear definition of done
open_questions: []
stages:
  - id: intake
    name: Intake
    description: Capture the system concept, objective, constraints, and initial risks.
    status: in_progress
    required_files:
      - schema/system.schema.yaml
      - templates/system-template.yaml
    checks:
      - System file validates against schema
      - Objective, inputs, outputs, and dependencies are explicit
    definition_of_done:
      - Objective captured and measurable
      - Inputs and outputs listed
      - Dependencies noted
      - Next stage issue drafted
    next_hint: Move into scaffold with a minimal repo layout and instructions for the first agent pass.
  - id: scaffold
    name: Scaffold
    description: Prepare starter files, docs, and automation for the system in this repository.
    status: planned
    required_files:
      - README.md
      - SYSTEMS.md
    checks:
      - Repo contains lifecycle docs and playbooks
      - Template system file exists
    definition_of_done:
      - Core docs land in repo with install and run steps
      - GitHub actions wired for validation
      - Issue template or fixture ready for next stage
    next_hint: Add explicit contracts for inputs, outputs, and acceptance rules in this repo.
  - id: contracts
    name: Contracts
    description: Nail down interfaces, data contracts, and acceptance criteria.
    status: planned
    checks:
      - Inputs and outputs have concrete formats
      - Edge cases captured as acceptance criteria
    definition_of_done:
      - Contracts documented
      - Risks and assumptions recorded
    next_hint: Implement the core engine against these contracts.
  - id: core-engine
    name: Core Engine
    description: Build the main execution path that satisfies the contracts end to end.
    status: planned
    checks:
      - Happy-path runs are automated and deterministic
      - Logs are inspectable for debugging
    definition_of_done:
      - Core path implemented with basic validation
      - End-to-end flow produces expected outputs
    next_hint: Harden review coverage and regression checks.
  - id: review-hardening
    name: Review Hardening
    description: Add regression coverage, evals, and operational guardrails.
    status: planned
    checks:
      - Failure modes identified and captured as tests
      - Evaluation or fixtures recorded
    definition_of_done:
      - Regression or eval coverage in place
      - Observability and error handling validated
    next_hint: Finalize docs and release notes.
  - id: release
    name: Release
    description: Final verification and release packaging.
    status: planned
    checks:
      - Release notes drafted
      - Final validation complete
    definition_of_done:
      - System marked complete
      - Release issue created
    next_hint: Celebrate and archive follow-ups.
