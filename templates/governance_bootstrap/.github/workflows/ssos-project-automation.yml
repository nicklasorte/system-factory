name: SSOS Project Automation

on:
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

jobs:
  add-to-ssos-project:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event.pull_request.draft == false
    steps:
      - name: Add item to SSOS project
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/czar/projects/{{GITHUB_PROJECT_NUMBER}}
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
      - name: Label governance alignment
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: ssos, governance
      - name: Echo governing repo
        run: echo "Governing repo: {{GOVERNING_REPO}}"
