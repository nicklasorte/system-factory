provenance_record:
  run_id: "working-paper-review-engine-example-run"
  source_inputs:
    - name: "working_paper_markdown"
      description: "Draft paper content"
    - name: "review_guidelines"
      description: "Canonical review rubric pulled from spectrum-systems"
  source_repo: "spectrum-systems"
  source_version: "main"
  standards_version: "main"
  working_paper_revision: "set_when_known"
  generated_outputs:
    - name: "review_packet"
      description: "Decision, evidence, risks"
    - name: "risk_log"
      description: "Risks and mitigations tied to the draft"
  timestamps:
    started_at: "set_at_runtime"
    completed_at: "set_at_runtime"

# Keep this aligned with the provenance_record shape in spectrum-systems.
