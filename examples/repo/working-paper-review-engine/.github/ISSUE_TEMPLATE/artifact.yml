name: Artifact Change
description: Capture a governed artifact update aligned with SSOS standards.
title: "[Artifact] <artifact>"
labels: ["ssos", "artifact", "governance"]
body:
  - type: markdown
    attributes:
      value: |
        This repo is part of the SSOS / czar org and governed by nicklasorte/spectrum-systems.
        Governing repo: nicklasorte/spectrum-systems | System layer: Engine
  - type: input
    id: artifact
    attributes:
      label: Artifact
      description: Which governed artifact is being introduced or modified?
      placeholder: e.g., review_packet
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and scope
      description: Why is this change needed? Reference canonical contracts from nicklasorte/spectrum-systems.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and drift
      description: Describe compatibility with the current standards version and any drift mitigation.
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How will you validate this artifact against canonical contracts?
